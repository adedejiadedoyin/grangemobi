<script>
    
    
    
    var user_id;
   
    
    
    // Fetch the user profile data from facebook
    function getFbUserData(){
        FB.api('/me', {locale: 'en_US', fields: 'id,first_name,last_name,email,link,gender,locale,picture'},
        function (response) {
                var img_url = response.picture.data.url;
                $("#avatar").attr("src",img_url);
                $("#userProfilePic").attr("src",img_url);
                $(".profileCard h4").text(response.first_name + ' ' + response.last_name);
                $(".profileCard p").text(response.email);
                //set user_id
                user_id= response.id;
                
                //populate module in sidenav
                populateSideNavModule(response);
        });
    }
    
    
   
    
    
    // fetch the news
    getNews(); 
    function getNews() {
        
            var url = 'php/json-data-news.php';
            var todays_date = new Date();
            var article_date ; 

            $.getJSON(url,function(response) {
                        $.each(response.headlines, function(index, article) {
                            
                            article_date = new Date(article.date_published); 
                            
                            $('#newsDeck').append(
                           ' <div class="card   shadow"  data-id="'+article.id+'">'+
                                  '<img class="card-img-top" src="'+article.img_link+'" alt="Card image cap">' +
                                  '<div class="card-img-overlay"> <span class="badge badge-pill badge-danger">'+article.category+'</span> </div> '+
                                  '<div class="card-body">' +
                                    '<h5 class="card-title">'+article.title+'</h5>' +                                    
                                    '<small class="text-muted">'+dateDifference(todays_date,article_date)+ ' days ago' +'</small>' +
                              '</div>'
                              );
                        });
            });

    }
    
    
    
    
    //Open an Article 
    $(document).on("click",".card", function () {       
        var article_id=parseInt($(this).attr("data-id"));
        window.open("article_details.html?article_id=" + article_id,"_self");       
    });
    
    
    

</script>
