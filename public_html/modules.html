<script>
    
    var user_id;
    

  
    // Fetch the user profile data from facebook
    function getFbUserData(){
        FB.api('/me', {locale: 'en_US', fields: 'id,first_name,last_name,email,link,gender,locale,picture'},
        function (response) {
            var img_url = response.picture.data.url;
            $("#avatar").attr("src",img_url);
            $("#userProfilePic").attr("src",img_url);
            
            $(".profileCard h4").text(response.first_name + ' ' + response.last_name);
                $(".profileCard p").text(response.email);
            
            //set user_id
            user_id= response.id;
            
            //populate module in sidenav
            populateSideNavModule(response);
            
            getModules(response);
        });
    }



    function getModules(userData){ 
        
        var data = { 
            userID: userData.id
        };
        
        
         $.getJSON('php/json-data-userModules.php',data, function(result) {
             
             
                // add an alert
                $('#moduleCardDeck').append('<div class="alert alert-info" role="alert">' +
                                                'Your module list is empty,click on the button above to add a module'+
                                              '</div>'
                                      );
             
             
                $.each(result.userModules, function(index, module) { 
                    
                        // remove any alert from the DOM
                        $(".alert").remove();
                        $('#moduleCardDeck').append(
                                          '<div class="card mx-auto moduleCard text-white" style="max-width: 40rem;" data-id="'+module.moduleNo+'">' +
                                            '<div class="dropdown">' + 
                                                '<a id="dropdownMenuLink" href="javascript:void(0)" class="more" role="button"  data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" >' + 
                                                    '<i class="fa fa-ellipsis-v"></i>' + 
                                                '</a>' +
                                                '<div class="dropdown-menu" aria-labelledby="dropdownMenuButton">' +
                                                    '<a onclick="deleteModule('+ module.moduleNo + ')" class="dropdown-item" href="javascript:void(0)">Delete</a>'+
                                                '</div>'+
                                            '</div>'+
                                            '<div class="card-body" '+  'onclick="viewModule('+module.moduleNo+')"' + '>'+
                                              '<h5 class="card-title">'+module.moduleName +'</h5>'+
                                              '<p class="card-text">'+module.firstName + ' ' + module.lastName +'</p>'+
                                            '</div>' +
                                          '</div>' 
                          );
                });
         });
    }
    
    
    
    
    
    
    function viewModule(moduleNo){
       window.open("module_details.html?module_id=" + moduleNo,"_self");
    }
     
     
     function deleteModule(_module_id){
            var url = 'php/json-data-module-delete.php';
            var module_id=_module_id;

            var data = {
              moduleCode: module_id,
              userID: user_id
            };

            $.getJSON(url, data,function(response) { 
                    if(response.success==1){
                        
                        //show alert message to user
                        bootbox.alert({
                            message: "Module will be removed from your list",
                            size: 'small',
                            callback: function () {
                                location.reload();
                            }
                        });
                    }

             });
     }
     
    
 
</script>
